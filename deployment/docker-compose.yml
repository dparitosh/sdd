services:
  redis:
    image: redis:7-alpine
    container_name: mbse-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - mbse-network

  app:
    build:
      context: ..
      dockerfile: deployment/dockerfiles/Dockerfile.backend
    container_name: mbse-app
    depends_on:
      - redis
    env_file:
      - ../.env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    volumes:
      - ../data:/app/data
      - ../logs:/app/logs
    networks:
      - mbse-network
    ports:
      - "5000:5000"
    command: python -m uvicorn src.web.app_fastapi:app --host 0.0.0.0 --port 5000

volumes:
  redis_data:

networks:
  mbse-network:
    driver: bridge
