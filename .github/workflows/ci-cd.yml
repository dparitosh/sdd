name: CI/CD Pipeline

on:
  push:
    branches: [main, develop, feature/*, bugfix/*, hotfix/*]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [main, develop]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:  # Manual trigger
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production
      enforce_no_docker_artifacts:
        description: 'Enforce that Docker deployment artifacts are absent'
        required: false
        default: false
        type: boolean
  release:
    types: [published, created]

env:
  PYTHON_VERSION: "3.12"
  NODE_VERSION: "20"
  DOCKER_REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # Optional enforcement switch.
  # Default: disabled. Enable per-run via workflow_dispatch input, or set this to "true" if you
  # want enforcement on every run.
  ENFORCE_NO_DOCKER_ARTIFACTS: "false"

jobs:
  # ============================================================================
  # GIT WORKFLOW VALIDATION
  # ============================================================================
  git-validation:
    name: Validate Git Workflow
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for analysis

      - name: Validate branch naming convention
        if: github.event_name == 'pull_request'
        run: |
          BRANCH_NAME="${{ github.head_ref }}"
          echo "Validating branch name: $BRANCH_NAME"
          
          # Allowed patterns: feature/*, bugfix/*, hotfix/*, release/*, chore/*
          if [[ ! "$BRANCH_NAME" =~ ^(feature|bugfix|hotfix|release|chore)/.+ ]]; then
            echo "❌ Invalid branch name: $BRANCH_NAME"
            echo "Branch must follow pattern: feature/*, bugfix/*, hotfix/*, release/*, or chore/*"
            exit 1
          fi
          echo "✓ Branch name is valid"

      - name: Validate commit messages
        if: github.event_name == 'pull_request'
        run: |
          # Ensure the base branch exists locally for range comparisons.
          git fetch --no-tags --prune --depth=1 origin "${{ github.base_ref }}"
          echo "Checking commit messages for conventional commit format..."
          # Use HEAD (PR merge ref) and ignore merge commits to avoid false failures.
          git log --no-merges --format=%s origin/${{ github.base_ref }}..HEAD | while read -r msg; do
            if [[ ! "$msg" =~ ^(feat|fix|docs|style|refactor|test|chore|perf|ci|build|revert)(\(.+\))?:.+ ]]; then
              echo "❌ Invalid commit message: $msg"
              echo "Use conventional commits: type(scope): description"
              echo "Types: feat, fix, docs, style, refactor, test, chore, perf, ci, build, revert"
              exit 1
            fi
          done
          echo "✓ All commit messages follow conventional commit format"

      - name: Check for merge conflicts
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin ${{ github.base_ref }}
          if ! git merge-tree $(git merge-base HEAD origin/${{ github.base_ref }}) HEAD origin/${{ github.base_ref }} | grep -q "<<<<<"; then
            echo "✓ No merge conflicts detected"
          else
            echo "❌ Merge conflicts detected"
            exit 1
          fi

      - name: Enforce PR description
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request;
            if (!pr.body || pr.body.trim().length < 50) {
              core.setFailed('PR description must be at least 50 characters');
            } else {
              console.log('✓ PR description is adequate');
            }

      - name: Check for CHANGELOG update
        if: github.event_name == 'pull_request' && github.base_ref == 'main'
        run: |
          if git diff --name-only origin/${{ github.base_ref }}...${{ github.sha }} | grep -q "CHANGELOG.md"; then
            echo "✓ CHANGELOG.md updated"
          else
            echo "⚠️ Warning: CHANGELOG.md not updated (recommended for main branch PRs)"
          fi

      - name: (Optional) Enforce Docker artifacts absent
        if: env.ENFORCE_NO_DOCKER_ARTIFACTS == 'true' || (github.event_name == 'workflow_dispatch' && inputs.enforce_no_docker_artifacts)
        shell: bash
        run: |
          set -euo pipefail

          forbidden_paths=(
            "Dockerfile"
            "Dockerfile.frontend"
            "docker-compose.yml"
            "docker-compose.prod.yml"
            "docker/"
            "deployment/scripts/docker_manager.sh"
            "deployment/scripts/docker_manager.ps1"
            "deployment/scripts/docker_manager.bat"
          )

          failed=0
          for p in "${forbidden_paths[@]}"; do
            if [ -e "$p" ]; then
              echo "::error::Forbidden Docker deployment artifact exists: $p"
              failed=1
            fi
          done

          # Catch other compose variants (e.g., docker-compose.*.yml)
          if ls -1 docker-compose*.yml >/dev/null 2>&1; then
            echo "::error::Forbidden Docker compose files present:"
            ls -1 docker-compose*.yml || true
            failed=1
          fi

          if [ "$failed" -ne 0 ]; then
            echo "Docker deployment support must remain removed."
            exit 1
          fi

          echo "✓ No Docker deployment artifacts detected"

  # ============================================================================
  # CODE QUALITY CHECKS
  # ============================================================================
  lint:
    name: Lint Python Code
    runs-on: ubuntu-latest
    needs: [git-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black flake8 mypy
          pip install -r backend/requirements.txt -r backend/requirements-phase2.txt

      - name: Run Black (code formatting)
        run: black --check --diff backend/src/ backend/tests/

      - name: Run Flake8 (linting)
        run: |
          flake8 backend/src/ backend/tests/ \
            --max-line-length=100 \
            --exclude=__pycache__,.venv,venv,.git,backend/tests/legacy,backend/tests/.logs \
            --ignore=E203,W503,E501
        continue-on-error: true  # Informational until legacy/style debt is addressed

      - name: Run mypy (type checking)
        run: |
          mypy backend/src/ \
            --ignore-missing-imports \
            --no-strict-optional \
            --warn-unused-ignores
        continue-on-error: true  # Type hints still being added

  # ============================================================================
  # PYTHON TESTING (Backend)
  # ============================================================================
  test-backend:
    name: Test Backend (Python)
    runs-on: ubuntu-latest
    needs: [git-validation]
    strategy:
      matrix:
        python-version: ["3.12"]
    
    services:
      neo4j:
        image: neo4j:5.15-community
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        ports:
          - 7687:7687
          - 7474:7474
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('backend/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt -r backend/requirements-phase2.txt
          pip install pytest pytest-cov pytest-asyncio

      - name: Wait for Neo4j
        run: |
          timeout 60 bash -c 'until curl -f http://localhost:7474 > /dev/null 2>&1; do sleep 2; done'

      - name: Run pytest with coverage
        env:
          # Use the Neo4j service started in this workflow.
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
          PYTHONPATH: ${{ github.workspace }}/backend
        run: |
          pytest backend/tests/ \
            --cov=backend/src \
            --cov-report=xml \
            --cov-report=term-missing \
            --junit-xml=pytest-results.xml \
            -v

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: backend
          name: backend-coverage

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pytest-results-${{ matrix.python-version }}
          path: pytest-results.xml

  # ============================================================================
  # FRONTEND TESTING (React + TypeScript)
  # ============================================================================
  test-frontend:
    name: Test Frontend (React)
    runs-on: ubuntu-latest
    needs: [git-validation]
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npx tsc --noEmit || true
        continue-on-error: true

      - name: Run ESLint
        run: npm run lint
        continue-on-error: true

      - name: Build frontend
        run: npm run build

      - name: Verify build output
        shell: bash
        run: |
          set -euo pipefail
          echo "PWD: $(pwd)"
          echo "Top-level files:"
          ls -la
          echo "Frontend folder:"
          ls -la frontend
          echo "Frontend dist folder:"
          ls -la frontend/dist

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: frontend/dist
          if-no-files-found: error

  # ============================================================================
  # SECURITY SCANNING
  # ============================================================================
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: [lint, test-backend, test-frontend]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
