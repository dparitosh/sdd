version: '3.8'

services:
  neo4j:
    image: neo4j:5.14.0
    container_name: mbse-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/password123
      - NEO4J_PLUGINS=["apoc", "graph-data-science"]
      - NEO4J_dbms_memory_heap_max__size=2G
      - NEO4J_dbms_memory_pagecache_size=1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
      - neo4j_plugins:/plugins
    networks:
      - mbse-network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mbse-app
    depends_on:
      - neo4j
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password123
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    networks:
      - mbse-network
    ports:
      - "5000:5000"
    command: python -m uvicorn src.web.app_fastapi:app --host 0.0.0.0 --port 5000

volumes:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:

networks:
  mbse-network:
    driver: bridge
